spring:
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/paymentshop
    username: ${DB_USERNAME}
    password: ""
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
