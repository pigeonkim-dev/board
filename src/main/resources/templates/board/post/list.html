<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('게시글 목록')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">게시글 목록</h1>
        <a class="btn btn-primary" sec:authorize="isAuthenticated()" th:href="@{/board/posts/new}">새 글 작성</a>
    </div>

    <div class="app-card">
        <table class="table table-hover align-middle mb-0" th:unless="${posts.empty}">
            <thead class="table-light">
            <tr>
                <th style="width:80px">번호</th>
                <th>제목</th>
                <th style="width:80px" class="text-center">댓글</th>
                <th style="width:140px">작성자</th>
                <th style="width:170px">작성일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="post : ${posts.content}">
                <td class="text-secondary" th:text="${post.id}"></td>
                <td>
                    <a class="text-decoration-none fw-semibold"
                       th:href="@{/board/posts/{id}(id=${post.id})}" th:text="${post.title}"></a>
                </td>
                <td class="text-center">
                    <span class="badge text-bg-light" th:text="${post.commentCount}"></span>
                </td>
                <td th:text="${post.authorNickname}"></td>
                <td class="text-secondary small"
                    th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
            </tr>
            </tbody>
        </table>

        <div th:if="${posts.empty}" class="text-center text-secondary py-5">
            <p class="mb-3">아직 작성된 글이 없어요.</p>
            <a class="btn btn-outline-primary" sec:authorize="isAuthenticated()"
               th:href="@{/board/posts/new}">첫 글 작성하기</a>
            <a class="btn btn-outline-primary" sec:authorize="isAnonymous()"
               th:href="@{/member/login}">로그인하고 글쓰기</a>
        </div>
    </div>

    <nav class="mt-3" th:if="${posts.totalPages > 1}" aria-label="페이지 이동">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${!posts.hasPrevious()} ? 'disabled'">
                <a class="page-link" th:href="@{/board/posts(page=${posts.number - 1})}">이전</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link" th:text="${(posts.number + 1) + ' / ' + posts.totalPages}"></span>
            </li>
            <li class="page-item" th:classappend="${!posts.hasNext()} ? 'disabled'">
                <a class="page-link" th:href="@{/board/posts(page=${posts.number + 1})}">다음</a>
            </li>
        </ul>
    </nav>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
