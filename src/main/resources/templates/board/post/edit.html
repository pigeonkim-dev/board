<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('게시글 수정')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="app-card p-4">
                <h1 class="h3 mb-4">게시글 수정</h1>

                <form th:method="POST" th:action="@{/board/posts/{id}/edit(id=${post.id})}">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>

                    <div class="mb-3">
                        <label for="title" class="form-label">제목</label>
                        <input type="text" id="title" class="form-control" name="title" th:value="${post.title}"/>
                    </div>

                    <div class="mb-3">
                        <label for="content" class="form-label">본문</label>
                        <textarea id="content" class="form-control" name="content" rows="10"
                                  th:text="${post.content}"></textarea>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" id="commentsEnabled"
                               name="commentsEnabled" value="true" th:checked="${post.commentsEnabled}"/>
                        <label class="form-check-label" for="commentsEnabled">댓글 허용</label>
                    </div>

                    <button type="submit" class="btn btn-primary">수정</button>
                    <a class="btn btn-link" th:href="@{/board/posts/{id}(id=${post.id})}">취소</a>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
