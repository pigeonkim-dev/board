<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
</head>
<body>
<h1>게시글 수정</h1>

<form th:method="POST" th:action="@{/board/posts/{id}/edit(id=${post.id})}">
    <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>

    <div>
        <label>제목</label>
        <input type="text" name="title" th:value="${post.title}"/>
    </div>

    <div>
        <label>본문</label>
        <textarea name="content" rows="10" cols="50" th:text="${post.content}"></textarea>
    </div>

    <div>
        <label>
            <input type="checkbox" name="commentsEnabled" value="true" th:checked="${post.commentsEnabled}"/>
            댓글 허용
        </label>
    </div>

    <button type="submit">수정</button>
    <a th:href="@{/board/posts/{id}(id=${post.id})}">취소</a>
</form>
</body>
</html>
