<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('게시글 작성')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="app-card p-4">
                <h1 class="h3 mb-4">게시글 작성</h1>

                <form th:method="POST" th:action="@{/board/posts/new}" th:object="${postRequest}">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>

                    <div class="mb-3">
                        <label for="title" class="form-label">제목</label>
                        <input type="text" id="title" class="form-control"
                               th:field="*{title}" placeholder="제목을 입력하세요"/>
                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="content" class="form-label">본문</label>
                        <textarea id="content" class="form-control" th:field="*{content}"
                                  rows="10" placeholder="본문을 입력하세요"></textarea>
                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" id="commentsEnabled"
                               th:field="*{commentsEnabled}"/>
                        <label class="form-check-label" for="commentsEnabled">댓글 허용</label>
                    </div>

                    <button type="submit" class="btn btn-primary">작성</button>
                    <a class="btn btn-link" th:href="@{/board/posts}">취소</a>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
