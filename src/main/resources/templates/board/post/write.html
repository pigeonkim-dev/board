<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 작성</title>
</head>
<body>
<h1>게시글 작성</h1>

<form th:method="POST" th:action="@{/board/posts/new}" th:object="${postRequest}">
    <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>

    <div>
        <label>제목</label>
        <input type="text" th:field="*{title}" placeholder="제목을 입력하세요"/>
        <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color:red"></p>
    </div>

    <div>
        <label>본문</label>
        <textarea th:field="*{content}" rows="10" cols="50" placeholder="본문을 입력하세요"></textarea>
        <p th:if="${#fields.hasErrors('content')}" th:errors="*{content}" style="color:red"></p>
    </div>

    <div>
        <label>
            <input type="checkbox" th:field="*{commentsEnabled}"/>
            댓글 허용
        </label>
    </div>

    <button type="submit">작성</button>
    <a th:href="@{/board/posts}">취소</a>
</form>
</body>
</html>
