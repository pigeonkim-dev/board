<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${post.title})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4">
    <div class="app-card p-4 mb-4">
        <h1 class="h3 mb-2" th:text="${post.title}"></h1>
        <div class="text-secondary small mb-3">
            <span th:text="${post.authorNickname}"></span> ·
            <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
            <span th:if="${post.createdAt != post.updatedAt}"> · 수정됨</span>
        </div>
        <hr/>
        <p class="post-content mb-0" th:text="${post.content}"></p>
    </div>

    <div class="d-flex gap-2 mb-4">
        <a class="btn btn-outline-secondary" th:href="@{/board/posts}">목록</a>
        <a class="btn btn-outline-primary" sec:authorize="isAuthenticated()"
           th:href="@{/board/posts/{id}/edit(id=${post.id})}">수정</a>
        <form sec:authorize="isAuthenticated()" th:method="POST"
              th:action="@{/board/posts/{id}/delete(id=${post.id})}"
              onsubmit="return confirm('삭제하시겠습니까?')">
            <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-danger">삭제</button>
        </form>
    </div>

    <!-- 댓글 영역 -->
    <div class="app-card p-4" th:if="${post.commentsEnabled}">
        <h2 class="h5 mb-3">댓글 <span class="text-secondary" th:text="${post.commentCount}"></span></h2>

        <div th:if="${commentError}" class="alert alert-danger py-2" th:text="${commentError}"></div>

        <p th:if="${comments.empty}" class="text-secondary small">첫 댓글을 남겨보세요.</p>

        <div class="comment-item py-3" th:each="comment : ${comments}">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <strong th:text="${comment.authorNickname}"></strong>
                    <span class="text-secondary small ms-1"
                          th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                    <span class="text-secondary small"
                          th:if="${comment.createdAt != comment.updatedAt}">(수정됨)</span>
                </div>
                <form sec:authorize="isAuthenticated()" th:method="POST"
                      th:action="@{/board/posts/{postId}/comments/{commentId}/delete(postId=${post.id}, commentId=${comment.id})}"
                      onsubmit="return confirm('댓글을 삭제하시겠습니까?')">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-link text-secondary p-0">삭제</button>
                </form>
            </div>
            <p class="post-content mb-0 mt-1" th:text="${comment.content}"></p>
        </div>

        <!-- 댓글 작성 -->
        <form class="mt-3" sec:authorize="isAuthenticated()" th:method="POST"
              th:action="@{/board/posts/{postId}/comments(postId=${post.id})}"
              th:object="${commentRequest}">
            <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
            <div class="mb-2">
                <label for="commentContent" class="form-label visually-hidden">댓글</label>
                <textarea id="commentContent" class="form-control" th:field="*{content}"
                          rows="3" placeholder="댓글을 입력하세요 (500자 이내)"></textarea>
                <div class="text-danger small mt-1"
                     th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-sm">댓글 작성</button>
        </form>
        <p class="text-secondary small mt-3 mb-0" sec:authorize="isAnonymous()">
            댓글을 작성하려면 <a th:href="@{/member/login}">로그인</a>하세요.
        </p>
    </div>

    <div class="app-card p-4 text-secondary" th:unless="${post.commentsEnabled}">
        이 게시글은 댓글을 받지 않습니다.
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
