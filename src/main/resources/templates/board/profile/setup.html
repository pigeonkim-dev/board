<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>닉네임 설정</title>
</head>
<body>
<h1>게시판 닉네임 설정</h1>
<p>게시판을 이용하려면 닉네임을 먼저 설정해야 합니다.</p>

<form th:method="POST" th:action="@{/board/profile/setup}" th:object="${boardProfileRequest}">
    <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
    <input type="hidden" name="redirect" th:value="${redirect}"/>
    <input type="text" th:field="*{nickname}" placeholder="닉네임 (2~20자)"/>
    <p th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}" style="color:red"></p>
    <button type="submit">등록</button>
</form>
</body>
</html>
