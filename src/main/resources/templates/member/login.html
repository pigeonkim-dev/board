<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('로그인')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <div class="auth-wrap">
        <div class="app-card p-4">
            <h1 class="h4 text-center mb-4">로그인</h1>

            <div th:if="${param.error}" class="alert alert-danger py-2">
                이메일 또는 비밀번호가 올바르지 않습니다.
            </div>
            <div th:if="${param.logout}" class="alert alert-success py-2">
                로그아웃되었습니다.
            </div>

            <form th:method="POST" th:action="@{/member/login}">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                <div class="mb-3">
                    <label for="username" class="form-label">이메일</label>
                    <input type="email" id="username" class="form-control" name="username"
                           placeholder="you@example.com"/>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">비밀번호</label>
                    <input type="password" id="password" class="form-control" name="password"
                           placeholder="비밀번호"/>
                </div>
                <button type="submit" class="btn btn-primary w-100">로그인</button>
            </form>

            <p class="text-center text-secondary small mt-3 mb-0">
                아직 계정이 없으신가요? <a th:href="@{/member/signup}">회원가입</a>
            </p>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
