<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>
<form th:method="POST" th:action="@{/member/signup}" th:object="${signupRequest}">
    <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>

    <div>
        <input type="text" th:field="*{email}" placeholder="Email Address"/>
        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red"></p>
    </div>

    <div>
        <input type="password" th:field="*{password}" placeholder="Password"/>
        <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red"></p>
    </div>

    <div>
        <input type="text" th:field="*{name}" placeholder="Full name"/>
        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red"></p>
    </div>

    <div>
        <input type="text" th:field="*{nickname}" placeholder="닉네임 (2~20자)"/>
        <p th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}" style="color:red"></p>
    </div>

    <button type="submit">Sign Up</button>
</form>
</body>
</html>
