<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('회원가입')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <div class="auth-wrap">
        <div class="app-card p-4">
            <h1 class="h4 text-center mb-4">회원가입</h1>

            <form th:method="POST" th:action="@{/member/signup}" th:object="${signupRequest}">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label for="email" class="form-label">이메일</label>
                    <input type="email" id="email" class="form-control" th:field="*{email}"
                           placeholder="you@example.com"/>
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">비밀번호</label>
                    <input type="password" id="password" class="form-control" th:field="*{password}"
                           placeholder="비밀번호"/>
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div class="mb-3">
                    <label for="name" class="form-label">이름</label>
                    <input type="text" id="name" class="form-control" th:field="*{name}"
                           placeholder="이름"/>
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label for="nickname" class="form-label">닉네임</label>
                    <input type="text" id="nickname" class="form-control" th:field="*{nickname}"
                           placeholder="닉네임 (2~20자)"/>
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100">회원가입</button>
            </form>

            <p class="text-center text-secondary small mt-3 mb-0">
                이미 계정이 있으신가요? <a th:href="@{/member/login}">로그인</a>
            </p>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
